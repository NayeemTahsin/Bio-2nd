                g_ans: "উদ্দীপকের প্রক্রিয়াটি হলো টিস্যু কালচার (Tissue Culture)। এর প্রধান বৈজ্ঞানিক ধাপসমূহ নিচে আলোচনা করা হলো:\n\n১. এক্সপ্লান্ট নির্বাচন (Explant Selection): টিস্যু কালচারের জন্য উদ্ভিদের যেকোনো অংশ (যেমন: কচি পাতার টুকরো, কাণ্ড বা পরাগরেণু) নির্বাচন করা হয়। একে এক্সপ্লান্ট বলে।\n\n২. কালচার মিডিয়াম বা পুষ্টি মাধ্যম তৈরি: এক্সপ্লান্টের পুষ্টির জন্য প্রধান খনিজ উপাদান, ভিটামিন, সুক্রোজ এবং সঠিক অনুপাতে ফাইটোহরমোন (অক্সিন ও সাইটোকাইনিন) মিশিয়ে তরল মিডিয়াম তৈরি করা হয়। একে জমাট বাঁধার জন্য অ্যাগার (Agar) মেশানো হয়।\n\n৩. মিডিয়াম জীবাণুমুক্তকরণ (Sterilization): কাচের পাত্রে পুষ্টি মিডিয়াম নিয়ে অটোক্লেভ (Autoclave) যন্ত্রে ১২১°C তাপমাত্রায় ও ১৫ পাউন্ড চাপে প্রায় ২০ মিনিট রেখে সম্পূর্ণ জীবাণুমুক্ত করা হয়।\n\n৪. এক্সপ্লান্ট স্থাপন বা ইনোকুলেশন (Inoculation): জীবাণুমুক্ত পরিবেশে (লেমিনার এয়ার ফ্লো ক্যাবিনেট) এক্সপ্লান্টটি কাচের বোতলের পুষ্টি মাধ্যমে স্থাপন করা হয়।\n\n৫. ক্যালাস সৃষ্টি ও চারা উৎপাদন (Callus & Shoot formation): বোতলগুলোকে নির্দিষ্ট আলো ও তাপমাত্রার নিয়ন্ত্রিত কক্ষে রাখা হয়। কয়েকদিনের মধ্যে এক্সপ্লান্টটি বারবার বিভক্ত হয়ে একটি অবয়বহীন টিস্যুপিণ্ড বা ক্যালাস (Callus) গঠন করে। ক্যালাস থেকে পরবর্তীতে অসংখ্য ছোট ছোট অঙ্কুর বা চারা জন্মায়।\n\n৬. মূল সৃষ্টি ও মাঠে স্থানান্তর: চারাগুলোতে মূল না থাকলে মূল উৎপাদনকারী মিডিয়ামে স্থানান্তর করা হয়। মূল গজানোর পর চারাগুলোকে টবের মাটিতে নিয়ে ধাপে ধাপে প্রাকৃতিক পরিবেশের সাথে খাপ খাইয়ে মাঠে লাগানো হয়।",
                gh_ques: "কৃষিক্ষেত্রে ও বিলুপ্তপ্রায় উদ্ভিদ সংরক্ষণে টিস্যু কালচার প্রযুক্তির অবদান ও ভবিষ্যৎ সম্ভাবনা বিশ্লেষণ করো।",
                gh_ans: " sideline আধুনিক জীবপ্রযুক্তিতে টিস্যু কালচার এক অপার সম্ভাবনার দুয়ার উন্মোচন করেছে:\n\n১. দ্রুত বংশবৃদ্ধি (Micropropagation): \n  - এই প্রযুক্তির মাধ্যমে একটিমাত্র এক্সপ্লান্ট থেকে অত্যন্ত অল্প সময়ে ও সীমিত জায়গায় লাখ লাখ চারা তৈরি করা সম্ভব, যা প্রচলিত পদ্ধতিতে বছরের পর বছর লেগে যেত।\n\n২. রোগমুক্ত ও ভাইরাসমুক্ত চারা উৎপাদন:\n  - উদ্ভিদের অগ্রস্থ ভাজক টিস্যু (Apical Meristem) সবসময় রোগ ও ভাইরাসমুক্ত থাকে। এই মেরিস্টেম কালচার করে সম্পূর্ণ ভাইরাসমুক্ত সবল চারা উৎপাদন করা যায় (যেমন: গোল আলু, স্ট্রবেরি ও কলার চারা)।\n\n৩. ঋতুভিত্তিক সীমাবদ্ধতা দূরীকরণ:\n  - বছরের যেকোনো ঋতুতে ল্যাবরেটরির ভেতরে নিয়ন্ত্রিত পরিবেশে কাঙ্ক্ষিত চারা উৎপাদন করা যায়, ফলে মরশুমের জন্য অপেক্ষা করতে হয় না।\n\n৪. বিলুপ্তপ্রায় উদ্ভিদ সংরক্ষণ:\n  - যেসব বন্য বা ভেষজ উদ্ভিদের বীজ সহজে অঙ্কুরিত হয় না বা বিলুপ্তির পথে, তাদের এক্সপ্লান্ট ল্যাবে কালচার করে হাজার হাজার চারা বানিয়ে প্রকৃতিতে টিকিয়ে রাখা সম্ভব হচ্ছে।\n\n৫. হ্যাপ্লয়েড উদ্ভিদ উৎপাদন:\n  - পরাগরেণু বা পরাগধানী কালচার করার মাধ্যমে সরাসরি হ্যাপ্লয়েড (n) উদ্ভিদ উৎপন্ন করা যায়, যা উদ্ভিদ প্রজনন বিদ্যায় কাঙ্ক্ষিত হোমোজাইগাস লাইন তৈরিতে বিপ্লব এনেছে।",
                drawing_tips: "১. একটি টেস্টটিউব বা কাচের বোতল আঁকুন। তার ভেতরে জেলি (মিডিয়াম) এবং তার ওপর কচি পাতার টুকরো (এক্সপ্লান্ট) দেখান।\n২. পরের চিত্রে বোতলের ভেতরে শিকড় ও কচি পাতাওয়ালা ছোট ছোট চারা গজানোর ছবি আঁকুন।"

              {
                title: "রিকম্বিন্যান্ট ডিএনএ (rDNA) প্রযুক্তি",
                scenario: "চিত্র বা বর্ণনায়: প্লাসমিড ভেক্টর এবং দাতা কোষ থেকে কাঙ্ক্ষিত জিন সংগ্রহ করে রেস্ট্রিকশন এনজাইম দিয়ে কাটা, লাইগেজ দ্বারা জোড়া লাগানো এবং পরিশেষে ব্যাকটেরিয়ার দেহে প্রবেশ করিয়ে ইনসুলিনের মতো জীবন রক্ষাকারী হরমোন তৈরি করার প্রযুক্তি।",
                g_ques: "উদ্দীপকের জেনেটিক ইঞ্জিনিয়ারিং বা রিকম্বিন্যান্ট ডিএনএ তৈরির ধাপসমূহ ফ্লোচার্ট ও চিত্রসহ বর্ণনা করো।",
                g_ans: "রিকম্বিন্যান্ট ডিএনএ (rDNA) প্রযুক্তির মূল ধাপগুলো নিচে দেওয়া হলো:\n\n১. কাঙ্ক্ষিত ডিএনএ ও ভেক্টর নির্বাচন:\n  - দাতা জীব থেকে কাঙ্ক্ষিত বৈশিষ্ট্যধারী জিন (যেমন: মানুষের ইনসুলিন জিন) এবং বাহক হিসেবে ব্যাকটেরিয়ার (যেমন: E. coli) বৃত্তাকার প্লাসমিড ডিএনএ নির্বাচন করা হয়।\n\n২. রেস্ট্রিকশন এনজাইম দ্বারা কর্তন (Restriction Enzyme):\n  - প্লাসমিড ডিএনএ এবং দাতা ডিএনএ-এর কাঙ্ক্ষিত জিন অংশটিকে একই প্রকার রেস্ট্রিকশন এনজাইম দিয়ে নির্দিষ্ট স্থানে কেটে নেওয়া হয়। এর ফলে কাটা অংশে আঠালো প্রান্ত (Sticky ends) সৃষ্টি হয়।\n\n৩. ডিএনএ জোড়া লাগানো বা রিকম্বিন্যান্ট ডিএনএ সৃষ্টি:\n  - কাটা প্লাসমিড বাহক এবং দাতা জিনকে একসাথে মিশিয়ে 'ডিএনএ লাইগেজ' (DNA Ligase) এনজাইম যোগ করা হয়। লাইগেজ এনজাইম আঠালো প্রান্ত দুটিকে স্থায়ীভাবে জোড়া লাগিয়ে একটি নতুন সংকর বা রিকম্বিন্যান্ট ডিএনএ অণু তৈরি করে।\n\n৪. ট্রান্সফরমেশন ও পোষক কোষে প্রবেশ (Transformation):\n  - রিকম্বিন্যান্ট প্লাসমিডটিকে ক্যালসিয়াম ক্লোরাইড হিট শক ট্রিটমেন্টের মাধ্যমে উপযুক্ত পোষক ব্যাকটেরিয়া কোষের (E. coli) ভেতরে প্রবেশ করানো হয়। এই প্রক্রিয়াকে ট্রান্সফরমেশন বলে।\n\n৫. ক্লোনিং ও জিন প্রকাশ:\n  - রূপান্তরিত ব্যাকটেরিয়াটি যখন অনুকূল মাধ্যমে বিভাজিত হয়ে বংশবৃদ্ধি করে, তখন প্রতিটি নতুন কোষে রিকম্বিন্যান্ট প্লাসমিডেরও একটি করে হুবহু কপি তৈরি হয়। ব্যাকটেরিয়াটি কাঙ্ক্ষিত প্রোটিন (যেমন: ইনসুলিন) সংশ্লেষণ শুরু করে।",
                gh_ques: "চিকিৎসা ক্ষেত্রে ইনসুলিন উৎপাদন এবং কৃষিক্ষেত্রে ট্র্যান্সজেনিক ফসল তৈরিতে জিন প্রকৌশলের সফল প্রয়োগ বিশ্লেষণ করো।",
                gh_ans: "মানব কল্যাণে এবং কৃষির আধুনিকায়নে রিকম্বিন্যান্ট ডিএনএ প্রযুক্তির প্রয়োগ বৈপ্লবিক পরিবর্তন এনেছে:\n\n১. চিকিৎসা ক্ষেত্রে জীবন রক্ষাকারী ইনসুলিন উৎপাদন:\n  - পূর্বে ডায়াবেটিস রোগীদের জন্য গরু বা শূকরের অগ্ন্যাশয় থেকে ইনসুলিন সংগ্রহ করা হতো, যা ব্যয়বহুল ও অ্যালার্জির কারণ ছিল।\n  - বর্তমানে মানুষের ইনসুলিন জিন ব্যাকটেরিয়ার প্লাসমিডে যুক্ত করে বাণিজ্যিকভাবে রিকম্বিন্যান্ট ইনসুলিন (যেমন: হিউমুলিন) তৈরি করা হচ্ছে। অত্যন্ত সস্তায়, বিশুদ্ধ উপায়ে এবং অফুরন্ত মাত্রায় ডায়াবেটিস নিয়ন্ত্রণে এই ইনসুলিন ব্যবহৃত হচ্ছে।\n\n২. কৃষিক্ষেত্রে পেস্ট ও পোকামাকড় প্রতিরোধী ট্রান্সজেনিক ফসল (Bt Crops):\n  - Bacillus thuringiensis (Bt) নামক ব্যাকটেরিয়ার কীট-প্রতিরোধী বিষাক্ত প্রোটিন উৎপাদনকারী জিন তুলা বা বেগুনের কোষে স্থানান্তর করে 'বিটি কটন' ও 'বিটি বেগুন' তৈরি করা হয়েছে। এর ফলে ফসলে কোনো রাসায়নিক কীটনাশক স্প্রে করতে হয় না, ফলে পরিবেশ দূষণ কমে এবং ফলন বৃদ্ধি পায়।\n\n৩. পুষ্টিমান উন্নয়ন (গোল্ডেন রাইস - Golden Rice):\n  - সাধারণ ধানের জিনে ড্যাফোডিল ফুল থেকে বিটা-ক্যারোটিন (ভিটামিন-এ এর পূর্বাবস্থা) উৎপাদনকারী জিন যুক্ত করে 'গোল্ডেন রাইস' তৈরি করা হয়েছে, যা অনুন্নত দেশের শিশুদের রাতকানা রোগ দূর করতে সাহায্য করে।\n\n৪. খরা ও লবণাক্ততা সহনশীল জাত উদ্ভাবন:\n  - প্রতিকূল পরিবেশে জলবায়ু পরিবর্তনের প্রকোপ মোকাবেলা করার জন্য লবণাক্ত ও খরা সহনশীল ধান বা অন্যান্য শস্যের জাত উদ্ভাবন করা সম্ভব হয়েছে।",
                drawing_tips: "১. একটি বৃত্ত আঁকুন (প্লাসমিড)। কাঁচি দিয়ে কাটার মতো করে বৃত্তের এক প্রান্ত ফাঁকা দেখান।\n২. অন্য এক টুকরো রঙিন বা ভিন্ন ডিজাইনের সুতা (বিদেশী জিন) এনে ফাঁকা স্থানে বসিয়ে দিন এবং লাইগেজ এনজাইমের নাম লিখে রিকম্বিন্যান্ট ডিএনএ লেবেল করুন।"
              }
            ]
          }
        ];

        // Primary App Component
        function App() {
          const [selectedChapterId, setSelectedChapterId] = useState(null);
          const [searchQuery, setSearchQuery] = useState("");
          const [completedTopics, setCompletedTopics] = useState(() => {
            try {
              const saved = localStorage.getItem("hsc_bio_completed_topics");
              return saved ? JSON.parse(saved) : {};
            } catch {
              return {};
            }
          });
          
          // State for collapsible panels
          const [expandedTopicIndex, setExpandedTopicIndex] = useState(null);
          const [expandedSection, setExpandedSection] = useState(null); // 'g', 'gh', or 'draw'

          // Toggle topic completion state
          const toggleTopicCompletion = (chapterId, topicTitle, e) => {
            e.stopPropagation();
            const key = `${chapterId}-${topicTitle}`;
            const updated = { ...completedTopics, [key]: !completedTopics[key] };
            setCompletedTopics(updated);
            try {
              localStorage.setItem("hsc_bio_completed_topics", JSON.stringify(updated));
            } catch (err) {
              console.warn("Storage limits or iframe settings blocked saving state.");
            }
          };

          // Filtering logic for search query
          const filteredSyllabus = useMemo(() => {
            if (!searchQuery.trim()) return SYLLABUS_DATA;
            const query = searchQuery.toLowerCase();
            return SYLLABUS_DATA.map(ch => {
              const matchedTopics = ch.topics.filter(t => 
                t.title.toLowerCase().includes(query) ||
                t.scenario.toLowerCase().includes(query) ||
                t.g_ques.toLowerCase().includes(query) ||
                t.gh_ques.toLowerCase().includes(query)
              );
              if (ch.name.toLowerCase().includes(query) || matchedTopics.length > 0) {
                return {
                  ...ch,
                  topics: matchedTopics.length > 0 ? matchedTopics : ch.topics
                };
              }
              return null;
            }).filter(Boolean);
          }, [searchQuery]);

          const activeChapter = useMemo(() => {
            return SYLLABUS_DATA.find(ch => ch.id === selectedChapterId);
          }, [selectedChapterId]);

          // Stat calculation
          const totalTopicsCount = useMemo(() => {
            return SYLLABUS_DATA.reduce((sum, ch) => sum + ch.topics.length, 0);
          }, []);

          const completedTopicsCount = useMemo(() => {
            return Object.values(completedTopics).filter(Boolean).length;
          }, [completedTopics]);

          const completionPercentage = useMemo(() => {
            if (totalTopicsCount === 0) return 0;
            return Math.round((completedTopicsCount / totalTopicsCount) * 100);
          }, [completedTopicsCount, totalTopicsCount]);

                <div className="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-teal-900/20 blur-[120px]" />
              </div>

              {/* Main Container */}
              <div className="z-10 w-full">
                
                {/* Header Navbar */}
                <header className="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800/80">
                  <div className="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                    
                    {/* Brand / Logo */}
                    <div className="flex items-center gap-3 cursor-pointer" onClick={() => { setSelectedChapterId(null); setExpandedTopicIndex(null); }}>
                      <div className="bg-gradient-to-tr from-emerald-500 to-teal-400 text-slate-950 p-2.5 rounded-xl shadow-lg shadow-emerald-500/10 font-extrabold text-lg tracking-wider">
                        HSC
                      </div>
                      <div>
                        <h1 className="text-lg md:text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-200 via-teal-100 to-emerald-100">
                          জীববিজ্ঞান ১ম পত্র (CQ Guide)
                        </h1>
                        <p className="text-xs text-emerald-400/90 font-medium tracking-wide">প্রফেসর ড. আবুল হাসান স্যারের পাঠ্যবই ভিত্তিক বিশ্লেষণ</p>
                      </div>
                    </div>

                    {/* Live Search Panel */}
                    <div className="relative w-full sm:w-72">
                      <span className="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 pointer-events-none">
                        <SearchIcon />
                      </span>
                      <input

                        placeholder="টপিক, উদ্দীপক বা প্রশ্ন খুঁজুন..."

                        onChange={(e) => setSearchQuery(e.target.value)}
                        className="w-full bg-slate-950/80 text-slate-200 placeholder:text-slate-500 text-xs rounded-xl pl-9 pr-4 py-2.5 border border-slate-800 focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/20 focus:outline-none transition-all"
                      />
                      {searchQuery && (
                        <button 
                          onClick={() => setSearchQuery("")}
                          className="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300 text-xs"
                        >
                          মুছুন
                        </button>
                      )}
                    </div>

                  </div>
                </header>

                {/* Main Content Area */}
                <main className="max-w-6xl mx-auto px-4 py-8">

                      <h2 className="text-sm font-bold text-slate-300">আপনার বোর্ড প্রস্তুতি অগ্রগতি ট্র্যাকার</h2>
                      <p className="text-xs text-slate-400">গুরুত্বপূর্ণ সৃজনশীল টপিকসমূহ পড়ার পর ডানদিকের বক্সে টিক দিয়ে সম্পন্ন চিহ্নিত করুন।</p>
                    </div>
                    <div className="flex items-center gap-4 w-full md:w-auto">
                      <div className="w-full md:w-48 bg-slate-950 h-2.5 rounded-full overflow-hidden border border-slate-800">
                        <div 
                          className="bg-gradient-to-r from-emerald-500 to-teal-400 h-full rounded-full transition-all duration-500"
                          style={{ width: `${completionPercentage}%` }}
                        />
                      </div>
                      <span className="text-xs font-extrabold text-emerald-400 whitespace-nowrap bg-emerald-500/10 px-3 py-1.5 rounded-lg border border-emerald-500/20">
                        {completionPercentage}% সম্পন্ন ({completedTopicsCount}/{totalTopicsCount})
                      </span>
                    </div>
                  </div>

                  {/* SCREEN 1: CHAPTERS OVERVIEW (INDEX) */}
                  {selectedChapterId === null ? (
                    <div className="space-y-8">
                      
                      {/* Hero Welcome banner */}
                      <div className="p-6 md:p-8 rounded-3xl bg-gradient-to-br from-slate-900 via-slate-900/90 to-emerald-950/20 border border-slate-800/80 shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-8 opacity-10">
                          <BookOpenIcon />
                        </div>
                        <div className="max-w-2xl space-y-4">
                          <span className="bg-emerald-500/10 text-emerald-400 font-extrabold text-[10px] tracking-wider uppercase px-3 py-1 rounded-full border border-emerald-500/20">
                            বোর্ড সৃজনশীল সমাধান কোষ (CQ Companion)
                          </span>
                          <h2 className="text-2xl md:text-3xl font-black text-slate-100 leading-tight">
                            জীববিজ্ঞান ১ম পত্রে জিপিএ-৫ পাওয়ার নির্ভরযোগ্য গাইড
                          </h2>
                          <p className="text-xs md:text-sm text-slate-400 leading-relaxed">
                            এইচএসসির সৃজনশীল পরীক্ষার প্রশ্নপত্রে শুধুমাত্র <strong>(গ) প্রয়োগমূলক</strong> এবং <strong>(ঘ) উচ্চতর দক্ষতা</strong> প্রশ্নের সঠিক উত্তর করার বৈজ্ঞানিক কৌশলে জোর দেওয়া হয়েছে। নিচে অধ্যায়ভিত্তিক সূচিপত্র থেকে পড়াশোনা শুরু করুন।
                          </p>
                        </div>
                      </div>

                      {/* Chapter Directory Grid */}
                      <div className="space-y-4">
                        <div className="flex items-center justify-between">
                          <h3 className="text-base font-bold text-slate-300 flex items-center gap-2">
                            <span className="w-1.5 h-5 rounded bg-emerald-500" />
                            অধ্যায়ভিত্তিক সৃজনশীল সূচিপত্র (Chapter Index)
                          </h3>
                          <span className="text-xs text-slate-500">{filteredSyllabus.length} টি অধ্যায় প্রদর্শিত</span>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

                            const chapterTopics = chapter.topics;
                            const completedLocal = chapterTopics.filter(t => completedTopics[`${chapter.id}-${t.title}`]).length;
                            const localPercent = chapterTopics.length > 0 ? Math.round((completedLocal / chapterTopics.length) * 100) : 0;

                            return (
                              <div
                                key={chapter.id}
                                onClick={() => { setSelectedChapterId(chapter.id); setExpandedTopicIndex(0); }}
                                className="group cursor-pointer p-5 rounded-2xl bg-slate-900/50 hover:bg-slate-900 border border-slate-800/80 hover:border-emerald-500/30 transition-all duration-300 shadow-sm flex items-center justify-between gap-4"
                              >
                                <div className="flex items-center gap-4">
                                  <div className="w-12 h-12 rounded-xl bg-slate-950 flex items-center justify-center font-black text-sm text-emerald-400 border border-slate-800 group-hover:border-emerald-500/30 transition-all">
                                    {chapter.chapterNo}
                                  </div>
                                  <div>
                                    <h4 className="text-sm font-extrabold text-slate-200 group-hover:text-slate-100 transition-colors">
                                      অধ্যায় {chapter.chapterNo}: {chapter.name}
                                    </h4>
                                    <p className="text-xs text-slate-500 mt-1">
                                      {chapter.topics.length}টি অতি-গুরুত্বপূর্ণ সৃজনশীল টপিক বিশ্লেষণ
                                    </p>
                                  </div>
                                </div>

                                {/* Right Side Local Stats */}
                                <div className="flex flex-col items-end gap-1 shrink-0">
                                  <span className="text-[10px] font-bold text-slate-400 bg-slate-950 px-2 py-1 rounded border border-slate-800">
                                    {localPercent}% পঠিত
                                  </span>
                                  <div className="w-16 bg-slate-950 h-1 rounded-full overflow-hidden">
                                    <div 
                                      className="bg-emerald-400 h-full"
                                      style={{ width: `${localPercent}%` }}
                                    />
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>

                    </div>
                  ) : (
                    
                    /* SCREEN 2: ACTIVE CHAPTER STUDY HUB */
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                      
                      {/* Left Sidebar Topics list */}
                      <aside className="lg:col-span-4 space-y-4">
                        
                        {/* Go Back Home */}
                        <button
                          onClick={() => { setSelectedChapterId(null); setExpandedTopicIndex(null); }}
                          className="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl text-xs font-bold bg-slate-900 hover:bg-slate-850 border border-slate-800 hover:border-slate-700 text-slate-300 transition-all"
                        >
                          <HomeIcon /> প্রধান সূচিপত্রে ফিরে যান
                        </button>

                        {/* Interactive Topic Menu Box */}
                        <div className="bg-slate-900/40 rounded-2xl border border-slate-800/80 p-4 space-y-3">
                          <div className="pb-3 border-b border-slate-800/60">
                            <span className="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">চলতি অধ্যায়</span>
                            <h3 className="text-sm font-extrabold text-slate-200 mt-0.5">
                              অধ্যায় {activeChapter.chapterNo}: {activeChapter.name}
                            </h3>
                          </div>

                          <div className="space-y-1.5 max-h-[350px] overflow-y-auto pr-1">
                            {activeChapter.topics.map((topic, idx) => {
                              const isCompleted = completedTopics[`${activeChapter.id}-${topic.title}`];
                              return (
                                <div
                                  key={idx}
                                  onClick={() => { setExpandedTopicIndex(idx); setExpandedSection(null); }}
                                  className={`w-full text-left p-3 rounded-xl text-xs transition-all cursor-pointer border flex items-center justify-between gap-3 ${
                                    expandedTopicIndex === idx
                                      ? 'bg-gradient-to-r from-emerald-950/30 to-slate-900 border-emerald-500/30 text-emerald-300 font-bold'
                                      : 'bg-slate-950/40 hover:bg-slate-900 border-transparent text-slate-400 hover:text-slate-300'
                                  }`}
                                 Lucas>
                                  <div className="flex items-center gap-2 truncate">
                                    <span className={`w-1.5 h-1.5 rounded-full shrink-0 ${expandedTopicIndex === idx ? 'bg-emerald-400' : 'bg-slate-600'}`} />
                                    <span className="truncate">{topic.title}</span>
                                  </div>

                                  {/* Custom Inline Checkbox */}
                                  <button
                                    onClick={(e) => toggleTopicCompletion(activeChapter.id, topic.title, e)}
                                    className={`w-5 h-5 rounded-md flex items-center justify-center border transition-all ${
                                      isCompleted 
                                        ? 'bg-emerald-500 border-emerald-400 text-slate-950' 
                                        : 'border-slate-800 bg-slate-950 hover:border-slate-600 text-transparent'
                                    }`}
                                  >
                                    <CheckIcon />
                                  </button>
                                </div>
                              );
                            })}
                          </div>
                        </div>

                        {/* Other Chapters Links */}
                        <div className="bg-slate-900/20 rounded-2xl border border-slate-800/40 p-4 space-y-2.5">
                          <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-widest">অন্যান্য অধ্যায়সমূহ</h4>
                          <div className="grid grid-cols-2 gap-1.5">
                            {SYLLABUS_DATA.filter(ch => ch.id !== selectedChapterId).map((ch) => (
                              <button
                                key={ch.id}
                                onClick={() => { setSelectedChapterId(ch.id); setExpandedTopicIndex(0); setExpandedSection(null); }}
                                className="py-2 px-2.5 rounded-lg text-[11px] font-bold bg-slate-900/60 hover:bg-slate-900 text-slate-400 hover:text-slate-200 border border-slate-800/40 text-left truncate transition-all"
                              >
                                {ch.chapterNo}. {ch.name}
                              </button>
                            ))}
                          </div>
                        </div>

                      </aside>

                      {/* Right Study Desktop */}
                      <section className="lg:col-span-8 space-y-6">
                        
                        {activeChapter.topics[expandedTopicIndex] ? (
                          <div className="space-y-6">
                            
                            {/* Topic Presentation Block */}
                            <div className="bg-slate-900/50 rounded-2xl border border-slate-800/80 p-6 space-y-4">
                              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 pb-4 border-b border-slate-800/60">
                                <div>
                                  <span className="text-[10px] font-black text-emerald-400 uppercase tracking-wider">সৃজনশীল টপিক</span>
                                  <h2 className="text-xl font-extrabold text-slate-100 mt-1">
                                    {activeChapter.topics[expandedTopicIndex].title}
                                  </h2>
                                </div>
                                
                                <button
                                  onClick={(e) => toggleTopicCompletion(activeChapter.id, activeChapter.topics[expandedTopicIndex].title, e)}
