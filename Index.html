<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC Biology CQ Masterclass</title>
    <!-- Tailwind CSS CDN -->
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <!-- React & ReactDOM CDN -->
    <script src="[https://unpkg.com/react@18/umd/react.production.min.js](https://unpkg.com/react@18/umd/react.production.min.js)" crossorigin></script>
    <script src="[https://unpkg.com/react-dom@18/umd/react-dom.production.min.js](https://unpkg.com/react-dom@18/umd/react-dom.production.min.js)" crossorigin></script>
    <!-- Babel CDN (For JSX compilation in browser) -->
    <script src="[https://unpkg.com/@babel/standalone/babel.min.js](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
</head>
<body class="bg-slate-950 text-slate-100">
    
    <div id="root"></div>

    <script type="text/babel">
        // [এখানে আপনার hsc_bio_masterclass.jsx ফাইলের সমস্ত কোড কপি করে পেস্ট করুন]
        // তবে মনে রাখবেন, ফাইলের একদম প্রথম দিকের "import ..." লাইনগুলো বাদ দিয়ে পেস্ট করবেন।
        // এবং ফাইলের একদম শেষের "export default function App()" অংশটির পরিবর্তে নিচের মতো লিখুন:

        function App() {
            // ... (এখানে অ্যাপের ভেতরের সমস্ত স্টেট ও কোড থাকবে)
        }

        // রেন্ডার করার জন্য নিচের লাইনটি যুক্ত করুন:
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
